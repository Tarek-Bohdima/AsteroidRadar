# ──────────────────────────────────────────────────────────────
# Release workflow for AsteroidRadar
#
# TRIGGER: Push a tag like v1.4.0 or v2.0.0-beta
#   git tag v1.4.0
#   git push origin v1.4.0
#
# WHAT IT DOES:
#   1. Validates tag version matches app/build.gradle version
#   2. Runs unit tests (fail fast — no broken releases)
#   3. Decodes the keystore from base64 and sets env vars
#   4. Builds & signs a release APK  → attached to GitHub Release
#   5. Builds & signs a release AAB  → attached to GitHub Release (for Play
#      Store internal-testing upload — drag-and-drop into Play Console)
#   6. Attaches `mapping.txt` (R8 deobfuscation symbols) to the Release.
#      AAB embeds the map automatically since AGP 4.1, so Play Console
#      deobfuscates crashes without extra steps; this attachment is for
#      local `retrace` use on out-of-Play stack traces.
#   7. Creates a GitHub Release with all three files + auto-generated changelog.
#
# WHY THREE FILES ON THE RELEASE?
#   AAB     = the upload format Play Store wants for new apps since Aug 2021
#             (and required by Play App Signing). Drag this into the Console.
#   APK     = self-contained, installs directly on any Android device for
#             sideload smoke tests when you don't want to go through Play.
#   MAPPING = R8/ProGuard symbol map. Play Console gets it from inside the
#             AAB automatically; this copy is for manual `retrace` only.
#
# HOW SIGNING WORKS HERE:
#   Your build.gradle already reads signing config from env vars:
#     KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
#   So we just decode the JKS to a temp file and set those vars —
#   Gradle handles signing itself during the build. No extra signing
#   action needed.
#
# SECRETS TO ADD (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   — base64-encoded .jks file
#                          Generate: base64 -i your-keystore | tr -d '\n' | pbcopy
#   KEYSTORE_PASSWORD    — your keystore password
#   KEY_ALIAS            — your key alias (e.g. key13)
#   KEY_PASSWORD         — your key password
#   NASA_API_KEY         — NASA API key for release builds
#   GOOGLE_SERVICES_JSON_BASE64
#                        — base64-encoded google-services.json from Firebase
#                          Console (Phase 15b). Required for Crashlytics.
#                          Generate: base64 -i app/google-services.json \
#                                    | tr -d '\n' | pbcopy
# ──────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v1.2.3-beta, v2.0.0, etc.

# Needs write access to create the GitHub Release at the end of the workflow.
permissions:
  contents: write

# Third-party actions are pinned to commit SHAs (with the version tag in a
# trailing comment) — see .github/workflows/build_pull_request.yml for the
# rationale. Dependabot's `github-actions` ecosystem auto-bumps these weekly.
jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0       # full history needed for changelog generation

      # ── 2. Java setup ────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ──────────────────────────────────────
      #    Caches ~/.gradle between runs so dependencies aren't
      #    re-downloaded every time (same idea as Artifactory caching)
      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 4. Make gradlew executable ───────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Validate tag matches build.gradle version ─────────
      #    Extracts versionMajor/Minor/Patch from app/build.gradle.kts
      #    and checks they match the git tag that triggered this run.
      #
      #    Example: tag v1.3.6 must match versionMajor=1, versionMinor=3,
      #    versionPatch=6 in build.gradle.kts — if not, the workflow fails
      #    immediately with a clear message before wasting build time.
      #
      #    The classifier (INTERNAL, BETA, RELEASE etc.) is intentionally
      #    NOT checked — it's a label, not part of the numeric version.
      - name: Validate tag matches build.gradle version
        run: |
          # Extract the three numbers from app/build.gradle.kts. The Kotlin
          # DSL declares them as `val versionMajor = 1` etc.; `grep -oE
          # '[0-9]+'` plucks the first integer literal out of each line.
          MAJOR=$(grep "versionMajor" app/build.gradle.kts | head -1 | grep -oE '[0-9]+' | head -1)
          MINOR=$(grep "versionMinor" app/build.gradle.kts | head -1 | grep -oE '[0-9]+' | head -1)
          PATCH=$(grep "versionPatch" app/build.gradle.kts | head -1 | grep -oE '[0-9]+' | head -1)
          GRADLE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Strip the leading 'v' from the tag, then strip any classifier
          # e.g. v1.3.6-INTERNAL → 1.3.6,  v2.0.0-beta → 2.0.0
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-.*//')

          echo "Tag version:          $TAG_VERSION"
          echo "build.gradle version: $GRADLE_VERSION"

          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo ""
            echo "ERROR: Version mismatch!"
            echo "  Tag says:              $TAG_VERSION"
            echo "  build.gradle.kts says: $GRADLE_VERSION"
            echo ""
            echo "Fix: update versionMajor/Minor/Patch in app/build.gradle.kts"
            echo "to match the tag, commit and push, then re-tag."
            exit 1
          fi

          echo "Version check passed: $GRADLE_VERSION"

      # ── 6. Run unit tests ────────────────────────────────────
      #    Fail the release immediately if any test fails
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # ── 7. Decode keystore ───────────────────────────────────
      #    Decodes the base64 secret back into a real .jks file
      #    in a temp location. The path is then passed to Gradle
      #    via KEYSTORE_PATH, matching exactly what your build.gradle
      #    reads with: System.getenv("KEYSTORE_PATH")
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > ${{ runner.temp }}/release.jks

      # ── 7b. Decode google-services.json ──────────────────────
      #    Phase 15b — Firebase Crashlytics requires google-services.json
      #    at app/google-services.json. Same pattern as the keystore: a
      #    base64-encoded secret decoded into the location the build
      #    expects. The google-services Gradle plugin reads this file at
      #    configure time, generates per-variant resources, and the
      #    Crashlytics SDK reads those at init.
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode \
            > app/google-services.json

      # ── 8. Build & sign release APK ──────────────────────────
      #    Gradle reads the env vars below and applies signingConfigs.release
      #    automatically — no separate signing step needed.
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 9. Build & sign release AAB ──────────────────────────
      #    Same env vars — Gradle signs the AAB the same way.
      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 10. Locate built artifacts ───────────────────────────
      #    `mapping.txt` is produced by R8 when isMinifyEnabled = true
      #    (Phase 6b enabled this on release). Path is the AGP default:
      #    app/build/outputs/mapping/release/mapping.txt.
      - name: Locate APK, AAB, and mapping
        id: locate
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          MAPPING=$(find app/build/outputs/mapping/release -name "mapping.txt" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          echo "mapping_path=$MAPPING" >> $GITHUB_OUTPUT

      # ── 11. Auto-generate changelog ──────────────────────────
      #    Collects all commits between this tag and the previous one.
      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          echo "## What's changed" > changelog.md
          echo "" >> changelog.md
          echo "$LOG" >> changelog.md
          echo "" >> changelog.md
          echo "**Full changelog:** \
          https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}" \
          >> changelog.md
          cat changelog.md

      # ── 12. Create GitHub Release ────────────────────────────
      #    All three artifacts attached:
      #      *.aab       — drag into Play Console → Internal testing.
      #      *.apk       — sideload smoke build (no Play Store needed).
      #      mapping.txt — manual stack-trace `retrace` material.
      #
      #    `softprops/action-gh-release` accepts a multiline `files:` block
      #    where each line is a glob; trailing whitespace and empty lines
      #    are tolerated.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "${{ github.ref_name }}"
          body_path: changelog.md
          files: |
            ${{ steps.locate.outputs.aab_path }}
            ${{ steps.locate.outputs.apk_path }}
            ${{ steps.locate.outputs.mapping_path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'INTERNAL') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'RC') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
