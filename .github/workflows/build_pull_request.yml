name: Android CI

on:
  pull_request:
    branches: [ master ]

# Read-only token; fork PRs cannot write back to the repo via this workflow.
permissions:
  contents: read

# Cancel in-progress runs when a new commit lands on the same ref so superseded
# commits don't keep burning runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned to commit SHAs (with the version tag in a
# trailing comment) to neutralize supply-chain risk: a compromised upstream
# tag can't silently swap behavior under us. Dependabot's `github-actions`
# ecosystem auto-bumps these on a weekly cadence.
jobs:
  # Cheap (~10s) gate that decides whether the heavy `build` job runs. If a PR
  # only touches docs (Markdown / docs/ / LICENSE / .gitignore), `build` is
  # skipped — and a skipped required check counts as "passing" in branch
  # protection, so docs PRs merge without burning gradle minutes. Update the
  # regex below if a new docs-only path is added (e.g. screenshots/).
  detect:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect non-docs changes
        id: filter
        # `BASE_REF` is passed through `env` rather than interpolated directly
        # into the script. Templated `${{ … }}` is expanded by the Actions
        # engine before bash sees it, so any context value that ever contained
        # shell metacharacters would become arbitrary command execution. Going
        # via `env` makes it a regular shell variable that bash treats as data.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Fail closed: if the diff itself fails for any reason, run the full
          # build rather than silently skipping it. `set -e` doesn't trip on a
          # failure inside `$(…)`, so check the exit status explicitly.
          if ! changed=$(git diff --name-only "origin/${BASE_REF}...HEAD"); then
            echo "git diff failed — defaulting to a full build run." >&2
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files in this PR:"
          echo "$changed"
          if echo "$changed" | grep -qvE '\.md$|^docs/|^LICENSE$|^\.gitignore$'; then
            echo "code=true"  >> "$GITHUB_OUTPUT"
            echo "Decision: code changes present — running build."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Decision: docs-only PR — skipping build."
          fi

  build:
    needs: detect
    if: needs.detect.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Spotless check
        # Fast formatting / license-header check — runs before the heavier
        # build steps so missing header or wrong indent fails fast.
        run: ./gradlew spotlessCheck

      - name: Run Detekt
        # Static analysis (cyclomatic complexity, magic numbers, naming, etc.).
        # Existing violations are baselined in `config/detekt/baseline.xml`;
        # new code is checked against defaults + `config/detekt.yml`.
        run: ./gradlew detekt

      - name: Run Android Lint (release variant)
        # Catches Android-specific issues (deprecated APIs, missing translations,
        # accessibility, manifest, resources). Existing warnings live in each
        # module's `lint-baseline.xml`.
        run: ./gradlew lintRelease

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload lint and test reports
        # Always upload — they're most useful when one of the gates above fails.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7
