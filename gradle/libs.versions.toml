# Version catalog — single source of truth for plugin / library versions.
# Phase 1 of docs/IMPROVEMENT_PLAN.md. Versions match the pre-migration baseline
# exactly; the toolchain bump in Phase 4 will move them in a coordinated PR.

[versions]
agp = "8.3.0"
kotlin = "2.0.21"
# KSP versions track the Kotlin compiler they were built against — must match.
ksp = "2.0.21-1.0.27"
androidxNavigation = "2.8.5"

androidxAppcompat = "1.7.0"
androidxConstraintlayout = "2.2.0"
androidxCore = "1.15.0"
androidxFragment = "1.8.5"
androidxLifecycle = "2.8.7"
androidxRecyclerview = "1.4.0"
# Room 2.8.x requires AGP >= 8.5; staying on 2.7.x until the AGP bump PR.
androidxRoom = "2.7.2"
androidxWork = "2.10.0"

# Coroutines core + android unified on a single ref now that they're part of
# the same toolchain bump. Phase 4a goal.
kotlinxCoroutines = "1.8.1"

moshi = "1.15.1"
picasso = "2.8"
retrofit = "2.9.0"
retrofitCoroutinesAdapter = "0.9.2"
timber = "5.0.1"

androidxEspresso = "3.7.0"
androidxTestExtJunit = "1.3.0"
junit = "4.13.2"

# Code-quality tooling. Spotless 6.x is the last branch that runs cleanly on
# Gradle 8.4 + Kotlin 1.6.x; Phase 4's toolchain bump can move to 7.x. ktlint
# is pinned for reproducibility across machines.
detekt = "1.23.8"
ktlint = "1.5.0"
spotless = "6.25.0"

[libraries]
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidxAppcompat" }
androidx-constraintlayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "androidxConstraintlayout" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
androidx-fragment-ktx = { module = "androidx.fragment:fragment-ktx", version.ref = "androidxFragment" }

androidx-lifecycle-livedata-ktx = { module = "androidx.lifecycle:lifecycle-livedata-ktx", version.ref = "androidxLifecycle" }
androidx-lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "androidxLifecycle" }

androidx-navigation-fragment-ktx = { module = "androidx.navigation:navigation-fragment-ktx", version.ref = "androidxNavigation" }
androidx-navigation-ui-ktx = { module = "androidx.navigation:navigation-ui-ktx", version.ref = "androidxNavigation" }

androidx-recyclerview = { module = "androidx.recyclerview:recyclerview", version.ref = "androidxRecyclerview" }

androidx-room-compiler = { module = "androidx.room:room-compiler", version.ref = "androidxRoom" }
androidx-room-ktx = { module = "androidx.room:room-ktx", version.ref = "androidxRoom" }
androidx-room-runtime = { module = "androidx.room:room-runtime", version.ref = "androidxRoom" }

androidx-work-runtime-ktx = { module = "androidx.work:work-runtime-ktx", version.ref = "androidxWork" }

kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "kotlinxCoroutines" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }

moshi = { module = "com.squareup.moshi:moshi", version.ref = "moshi" }
moshi-kotlin = { module = "com.squareup.moshi:moshi-kotlin", version.ref = "moshi" }

retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-converter-moshi = { module = "com.squareup.retrofit2:converter-moshi", version.ref = "retrofit" }
retrofit-converter-scalars = { module = "com.squareup.retrofit2:converter-scalars", version.ref = "retrofit" }
retrofit-coroutines-adapter = { module = "com.jakewharton.retrofit:retrofit2-kotlin-coroutines-adapter", version.ref = "retrofitCoroutinesAdapter" }

picasso = { module = "com.squareup.picasso:picasso", version.ref = "picasso" }
timber = { module = "com.jakewharton.timber:timber", version.ref = "timber" }

androidx-espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "androidxEspresso" }
androidx-test-ext-junit = { module = "androidx.test.ext:junit", version.ref = "androidxTestExtJunit" }
junit = { module = "junit:junit", version.ref = "junit" }

# Gradle-plugin Maven coordinates — used by the build-logic convention plugins
# (compileOnly classpath) so they can apply plugins by id. Versions are
# intentionally `version.ref`'d to the same refs used in [plugins] above so
# there's no opportunity for plugin id ↔ classpath drift.
android-gradle-plugin = { module = "com.android.tools.build:gradle", version.ref = "agp" }
kotlin-gradle-plugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
ksp-gradle-plugin = { module = "com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin", version.ref = "ksp" }
androidx-navigation-safeargs-gradle-plugin = { module = "androidx.navigation:navigation-safe-args-gradle-plugin", version.ref = "androidxNavigation" }

[bundles]
# Lifecycle-related libs that travel together (Modexa trick #6). When adding a
# new lifecycle-runtime-ktx in Phase 4, append to this bundle rather than the
# module dependencies block.
lifecycle = [
    "androidx-fragment-ktx",
    "androidx-lifecycle-livedata-ktx",
    "androidx-lifecycle-viewmodel-ktx",
]
# Navigation client-side runtime libs. The safe-args Gradle plugin is applied
# separately via [plugins].
navigation = [
    "androidx-navigation-fragment-ktx",
    "androidx-navigation-ui-ktx",
]
# Retrofit + Moshi networking stack, including both response converters and
# the Jake Wharton coroutines adapter that the legacy service uses.
networking = [
    "moshi",
    "moshi-kotlin",
    "retrofit",
    "retrofit-converter-moshi",
    "retrofit-converter-scalars",
    "retrofit-coroutines-adapter",
]
# Instrumented-test libs that go on the androidTest classpath together.
android-test = [
    "androidx-espresso-core",
    "androidx-test-ext-junit",
]

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
androidx-navigation-safeargs = { id = "androidx.navigation.safeargs.kotlin", version.ref = "androidxNavigation" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
# kapt is still applied because AGP 8.3.0's DataBinding compiler discovers
# @BindingAdapter methods via kapt; AGP 8.6+ moves DataBinding to KSP. Drop
# this entry once the AGP bump lands (a future PR after Phase 4).
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }
kotlin-parcelize = { id = "org.jetbrains.kotlin.plugin.parcelize", version.ref = "kotlin" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
